<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Loan Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #004080, #007bff);
      height: 100%;
      padding: 40px 0;
      color: white;
    }

    .container {
      max-width: 500px;
      background: rgba(255, 255, 255, 0.12);
      margin: auto;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(15px);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    form input, form select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      width: 100%;
    }

    button {
      padding: 12px;
      background: #00c6ff;
      color: white;
      border: none;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #0097cc;
    }

    .login-btn {
      background: transparent;
      border: 2px solid white;
      color: white;
      margin-top: -5px;
    }

    .login-btn:hover {
      background: white;
      color: #004080;
    }

    .text-small {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }

    a {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Your Account</h2>
    <form action="{% url 'register' %}" method="POST">
      {% csrf_token %}
      <input type="text" name="fullname" placeholder="Full Name" required pattern="[A-Za-z\s]{2,}" title="Only letters and spaces, at least 2 characters">

      <input type="tel" name="phone" placeholder="Phone Number" required pattern="[0-9]{10}" title="Phone number must be exactly 10 digits">

      <input type="email" name="email" placeholder="Email Address" required>

      <select name="state" required>
        <option value="" disabled selected>Select State</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
        <option value="Assam">Assam</option>
        <option value="Bihar">Bihar</option>
        <option value="Chhattisgarh">Chhattisgarh</option>
        <option value="Goa">Goa</option>
        <option value="Gujarat">Gujarat</option>
        <option value="Haryana">Haryana</option>
        <option value="Himachal Pradesh">Himachal Pradesh</option>
        <option value="Jharkhand">Jharkhand</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Kerala">Kerala</option>
        <option value="Madhya Pradesh">Madhya Pradesh</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Manipur">Manipur</option>
        <option value="Meghalaya">Meghalaya</option>
        <option value="Mizoram">Mizoram</option>
        <option value="Nagaland">Nagaland</option>
        <option value="Odisha">Odisha</option>
        <option value="Punjab">Punjab</option>
        <option value="Rajasthan">Rajasthan</option>
        <option value="Sikkim">Sikkim</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Telangana">Telangana</option>
        <option value="Tripura">Tripura</option>
        <option value="Uttar Pradesh">Uttar Pradesh</option>
        <option value="Uttarakhand">Uttarakhand</option>
        <option value="West Bengal">West Bengal</option>
        <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
        <option value="Chandigarh">Chandigarh</option>
        <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
        <option value="Delhi">Delhi</option>
        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
        <option value="Ladakh">Ladakh</option>
        <option value="Lakshadweep">Lakshadweep</option>
        <option value="Puducherry">Puducherry</option>
      </select>

    

      <input type="number" name="annual_income" placeholder="Annual Income" required min="10000" title="Minimum ₹10,000 annual income required">

      <input type="number" name="monthly_income" placeholder="Monthly Income" required min="1000" title="Minimum ₹1,000 monthly income required">

      <input type="date" name="dob" required>

      <input type="number" name="age" placeholder="Age" required min="18" max="100" title="Age must be between 18 and 100">

      <input type="text" name="loan_reason" placeholder="Reason for Loan" required>

      <input type="number" name="loan_amount" placeholder="Loan Amount" required min="1000" title="Loan amount must be at least ₹1,000">

      <select name="employment" required>
        <option value="" disabled selected>Employment Status</option>
        <option value="employed">Employed</option>
        <option value="self-employed">Self-Employed</option>
        <option value="unemployed">Unemployed</option>
      </select>

      <input type="text" name="work_type" placeholder="Type of Work" required>

      <select name="marital_status" required>
        <option value="" disabled selected>Marital Status</option>
        <option value="single">Single</option>
        <option value="married">Married</option>
        <option value="divorced">Divorced</option>
      </select>

      <input type="password" name="password" placeholder="Password" required minlength="6" title="Password must be at least 6 characters">

      <input type="password" name="repassword" placeholder="Re-enter Password" required minlength="6" title="Must match the password above">

      <button type="submit">Register</button>
    </form>

    <form action="{% url 'login' %}" method="get">
      {% csrf_token %}
      <button type="submit" class="login-btn">Go to Login</button>
    </form>
  </div>
</body>
</html>
