<!-- intro.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Predictor - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #001f3f, #0074D9);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      width: 400px;
    }

    .glass-card h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .glass-card p {
      font-size: 16px;
      margin-bottom: 30px;
    }

    .glass-card a {
      display: inline-block;
      padding: 10px 25px;
      background: #00bcd4;
      color: white;
      border-radius: 25px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .glass-card a:hover {
      background: #0097a7;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>Welcome to Loan Predictor</h1>
    <p>Check your loan eligibility with smart insights & credit analytics.</p>
    <a href="{% url 'login' %}">Get Started</a>
  </div>
</body>
</html>
